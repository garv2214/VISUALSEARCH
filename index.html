<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Blockchain Voting System</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <!-- Registration Form -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Voter Registration</h5>
                    </div>
                    <div class="card-body">
                        <form id="registrationForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="idNumber" class="form-label">ID Number</label>
                                <input type="text" class="form-control" id="idNumber" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Register</button>
                        </form>
                    </div>
                </div>

                <!-- Voting Form -->
                <div class="card mt-4" id="votingCard" style="display: none;">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Cast Your Vote</h5>
                    </div>
                    <div class="card-body">
                        <form id="votingForm">
                            <div class="mb-3">
                                <label class="form-label">Select Candidate</label>
                                {% for id, name in candidates.items() %}
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="candidate" id="candidate{{ id }}" value="{{ id }}" required>
                                    <label class="form-check-label" for="candidate{{ id }}">
                                        {{ name }}
                                    </label>
                                </div>
                                {% endfor %}
                            </div>
                            <button type="submit" class="btn btn-success">Cast Vote</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Results and Verification -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Voting Results</h5>
                    </div>
                    <div class="card-body">
                        <div id="results">
                            <div class="text-center text-muted">
                                <p>No votes cast yet</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4" id="verificationCard" style="display: none;">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Vote Verification</h5>
                    </div>
                    <div class="card-body">
                        <div id="verificationResult">
                            <p>Your vote signature: <span id="voteSignature"></span></p>
                            <button id="verifyButton" class="btn btn-info">Verify Vote</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
